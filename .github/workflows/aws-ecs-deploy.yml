name: AWS ECS Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIR: infra/terraform

jobs:
  tests:
    name: Phase 1 - Testing
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: file:./prisma/test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Prepare backend database
        working-directory: server
        run: |
          npx prisma generate
          rm -f prisma/test.db
          npx prisma db push --skip-generate --accept-data-loss
          node scripts/setup-db.js

      - name: Run backend unit and integration tests
        working-directory: server
        run: |
          mkdir -p reports
          npm test -- --coverage --forceExit --json --outputFile=reports/jest-results.json

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            server/reports/
            server/coverage/
          retention-days: 30

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Run frontend tests
        working-directory: client
        run: |
          mkdir -p reports
          npm test -- --run --reporter=default --reporter=json --outputFile=reports/vitest-results.json

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: client/reports/
          retention-days: 30

  terraform:
    name: Phase 2 - Terraform
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    permissions:
      contents: read
    outputs:
      ecr_repository_url: ${{ steps.tf_outputs.outputs.ecr_repository_url }}
      frontend_ecr_repository_url: ${{ steps.tf_outputs.outputs.frontend_ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf_outputs.outputs.ecs_service_name }}
      frontend_ecs_service_name: ${{ steps.tf_outputs.outputs.frontend_ecs_service_name }}
      ecs_task_family: ${{ steps.tf_outputs.outputs.ecs_task_family }}
      frontend_ecs_task_family: ${{ steps.tf_outputs.outputs.frontend_ecs_task_family }}
      load_balancer_dns_name: ${{ steps.tf_outputs.outputs.load_balancer_dns_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform state backend
        id: backend
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          BUCKET="shopsmart-tf-state-${ACCOUNT_ID}-${AWS_REGION}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION" --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi
          aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "$BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-public-access-block --bucket "$BUCKET" --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=shopsmart/prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -var="aws_region=${AWS_REGION}" -out=tfplan

      - name: Upload Terraform plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 7

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_ecr_repository_url=$(terraform output -raw frontend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_ecs_service_name=$(terraform output -raw frontend_ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_task_family=$(terraform output -raw ecs_task_family)" >> "$GITHUB_OUTPUT"
          echo "frontend_ecs_task_family=$(terraform output -raw frontend_ecs_task_family)" >> "$GITHUB_OUTPUT"
          echo "load_balancer_dns_name=$(terraform output -raw load_balancer_dns_name)" >> "$GITHUB_OUTPUT"

  terraform-pr-check:
    name: Phase 2 - Terraform PR Check
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init without backend
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend=false

      - name: Terraform fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

  deploy-ecs:
    name: Phase 3 - Build, Push, and Deploy to ECS
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        id: backend_image
        env:
          ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" ./server
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend Docker image
        id: frontend_image
        env:
          ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.frontend_ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" ./client
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render backend ECS task definition
        env:
          TASK_FAMILY: ${{ needs.terraform.outputs.ecs_task_family }}
          IMAGE_URI: ${{ steps.backend_image.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" --query taskDefinition > task-definition.json
          jq --arg image "$IMAGE_URI" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions[0].image = $image
          ' task-definition.json > rendered-backend-task-definition.json

      - name: Render frontend ECS task definition
        env:
          TASK_FAMILY: ${{ needs.terraform.outputs.frontend_ecs_task_family }}
          IMAGE_URI: ${{ steps.frontend_image.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" --query taskDefinition > frontend-task-definition.json
          jq --arg image "$IMAGE_URI" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions[0].image = $image
          ' frontend-task-definition.json > rendered-frontend-task-definition.json

      - name: Register backend ECS task definition
        id: backend_task
        run: |
          TASK_DEFINITION_ARN="$(aws ecs register-task-definition --cli-input-json file://rendered-backend-task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "task_definition_arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Register frontend ECS task definition
        id: frontend_task
        run: |
          TASK_DEFINITION_ARN="$(aws ecs register-task-definition --cli-input-json file://rendered-frontend-task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "task_definition_arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy backend service to ECS Fargate
        env:
          CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}
          TASK_DEFINITION_ARN: ${{ steps.backend_task.outputs.task_definition_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --desired-count 2
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Deploy frontend service to ECS Fargate
        env:
          CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          SERVICE_NAME: ${{ needs.terraform.outputs.frontend_ecs_service_name }}
          TASK_DEFINITION_ARN: ${{ steps.frontend_task.outputs.task_definition_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --desired-count 2
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Verify services are running
        env:
          CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          BACKEND_SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}
          FRONTEND_SERVICE_NAME: ${{ needs.terraform.outputs.frontend_ecs_service_name }}
          LOAD_BALANCER_DNS: ${{ needs.terraform.outputs.load_balancer_dns_name }}
        run: |
          BACKEND_RUNNING_COUNT="$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$BACKEND_SERVICE_NAME" --query 'services[0].runningCount' --output text)"
          FRONTEND_RUNNING_COUNT="$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$FRONTEND_SERVICE_NAME" --query 'services[0].runningCount' --output text)"
          test "$BACKEND_RUNNING_COUNT" -ge 1
          test "$FRONTEND_RUNNING_COUNT" -ge 1
          curl --retry 10 --retry-delay 10 --fail "http://${LOAD_BALANCER_DNS}/api/health"
          curl --retry 10 --retry-delay 10 --fail "http://${LOAD_BALANCER_DNS}/"
