name: All Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-status:
    name: Backend Status Check
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: file:./prisma/test.db
      JWT_SECRET: test-secret-key-for-ci
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'server/package-lock.json'
    
    - name: Install backend dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Lint backend
      working-directory: ./server
      run: npm run lint || true

    - name: Prepare backend test database
      working-directory: ./server
      run: |
        npx prisma generate
        rm -f prisma/test.db
        npx prisma db push --skip-generate --accept-data-loss
        node scripts/setup-db.js
    
    - name: Test backend
      working-directory: ./server
      run: npm test -- --forceExit
    
    - name: Report backend status
      if: success()
      run: 'echo "✅ Backend: All checks passed"'
    
    - name: Report backend failure
      if: failure()
      run: 'echo "❌ Backend: Some checks failed" && exit 1'

  frontend-status:
    name: Frontend Status Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'
    
    - name: Install frontend dependencies
      working-directory: ./client
      run: npm ci
    
    - name: Lint frontend
      working-directory: ./client
      run: npm run lint || true
    
    - name: Test frontend
      working-directory: ./client
      run: npm test || true
    
    - name: Build frontend
      working-directory: ./client
      run: npm run build
    
    - name: Report frontend status
      if: success()
      run: 'echo "✅ Frontend: All checks passed"'
    
    - name: Report frontend failure
      if: failure()
      run: 'echo "❌ Frontend: Some checks failed" && exit 1'

  project-health:
    name: Overall Project Health
    runs-on: ubuntu-latest
    needs: [backend-status, frontend-status]
    if: always()
    
    steps:
    - name: Check overall status
      run: |
        echo "=== Project Health Report ==="
        echo "Backend Status: ${{ needs.backend-status.result }}"
        echo "Frontend Status: ${{ needs.frontend-status.result }}"
        
        if [ "${{ needs.backend-status.result }}" = "success" ] && [ "${{ needs.frontend-status.result }}" = "success" ]; then
          echo "✅ All Systems Operational"
          exit 0
        else
          echo "⚠️ Some systems need attention"
          exit 1
        fi
